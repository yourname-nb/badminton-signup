<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球比赛报名</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 {
            color: #e74c3c;
            text-align: center;
        }
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #c0392b;
        }
        .qr-section {
            text-align: center;
            margin-top: 20px;
        }
        .qr-section img {
            width: 200px;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
        }
        .qr-section p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🏸 羽毛球友谊赛报名</h1>
    
    <div class="info-box">
        <h3>📋 活动信息</h3>
        <p><strong>时间：</strong>2026年7月5日 周六 14:00-18:00</p>
        <p><strong>地点：</strong>勇者羽毛球馆（1号场）</p>
        <p><strong>费用：</strong>AA制，约 25 元/人</p>
        <p><strong>名额：</strong>限 16 人（单打）</p>
    </div>

    <div class="info-box">
        <h3>📝 报名流程</h3>
        <p><strong>第一步：</strong>点击下方按钮填写报名表</p>
        <p><strong>第二步：</strong>加我微信（扫码下方二维码）</p>
        <p><strong>第三步：</strong>扫码支付报名费（备注姓名）</p>
        
        <a href="https://docs.qq.com/form/page/DSGJRQUZOaFR5dkpI" target="_blank" style="text-decoration:none;">
            <button type="button">立即填写报名表</button>
        </a>
    </div>

    <div class="info-box qr-section">
        <h3>📞 加我微信</h3>
        <p>报名后请务必加我，方便拉群通知</p>
        <img src="wechat-qr.png.jpg" alt="微信二维码">
        <p>扫码添加好友</p>
        
        <hr>
        
        <h3>💰 支付报名费</h3>
        <p>报名费：25元/人</p>
        <img src="payment-qr.png.jpg" alt="收款码">
        <p>扫码付款，备注姓名</p>
    </div>
</body>
</html>
