<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球比赛报名</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 {
            color: #e74c3c;
            text-align: center;
        }
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <h1>🏸 羽毛球友谊赛报名</h1>
    
    <div class="info-box">
        <h3>📋 活动信息</h3>
        <p><strong>时间：</strong>2026年7月5日 周六 14:00-18:00</p>
        <p><strong>地点：</strong>XX羽毛球馆（3号、4号场地）</p>
        <p><strong>费用：</strong>AA制，约 30 元/人</p>
        <p><strong>名额：</strong>限 24 人（单打12人 + 双打6组）</p>
    </div>

    <div class="info-box">
        <h3>📝 报名表</h3>
        <form>
            <label>姓名</label>
            <input type="text" placeholder="请输入你的姓名" required>

            <label>手机号</label>
            <input type="tel" placeholder="请输入手机号" required>

            <label>性别</label>
            <select>
                <option>男</option>
                <option>女</option>
            </select>

            <label>参赛项目</label>
            <select>
                <option>男子单打</option>
                <option>女子单打</option>
                <option>男子双打（需搭档）</option>
                <option>女子双打（需搭档）</option>
                <option>混合双打（需搭档）</option>
            </select>

            <label>搭档姓名（选双打时填写）</label>
            <input type="text" placeholder="没有搭档可填"无搭档"，现场匹配"">

            <button type="submit">立即报名</button>
        </form>
    </div>
</body>
</html>
